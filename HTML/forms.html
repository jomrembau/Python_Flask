<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="basic.html" method="get">
        <h1> Please Input Email and Password</h1>

        <label for="emailtag">E-MAIL:</label>
        <input id="emailtag" type="email" name="useremail" placeholder="youremail@email.com">
        <br>
        <label for="passwordtag">Password:</label>
        <input id="passwordtag" type="password" name="password" placeholder="Password">

        <input type="submit" value="Submit">
        <br>
        <h2> Do you own a dog? </h2>
        <label for="yes"> Yes: </label>
        <input type="radio" id:"yes" name="dog_choice" value="yes">

        <label for="no"> No: </label>
        <input type="radio" id:"no" name="dog_choice" value="no">
        <br>

        <h2> How clean is your house? (1-3) </h2>
        <select name="stars">
            <option value="Great!">3 </option>
            <option value="Good!!">2 </option>
            <option value="Bad!">1 </option>
        </select>

        <h3> Comments? </h3>
        <textarea name="name" rows="8" cols="80" placeholder="Enter Comment"></textarea>

        <input type="submit" value="Submit Feedback">


    </form>
    
</body>
</html>
